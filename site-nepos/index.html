<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:       #080f0c;
  --panel:    #0e1a15;
  --header:   #132018;
  --in:       #172310;
  --out:      #003d2e;
  --input-bg: #1a2e22;
  --text:     #e8f0eb;
  --sub:      #6b8f78;
  --green:    #00c98d;
  --green2:   #00f5aa;
  --gold:     #f0c040;
  --orange:   #ff8c42;
  --blue:     #4eb5ff;
  --red:      #ff5f6d;
  --radius:   9px;
}

html,body{
  height:100%; background:var(--bg);
  font-family:'Outfit',sans-serif;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:16px;
}

/* ── PHONE ── */
.phone{
  width:400px; max-width:100%;
  height:min(840px,96vh);
  background:var(--panel);
  border-radius:28px; overflow:hidden;
  display:flex; flex-direction:column;
  box-shadow:
    0 0 0 1px rgba(0,201,141,.12),
    0 40px 100px rgba(0,0,0,.85),
    0 0 120px rgba(0,201,141,.04);
}

/* ── HEADER ── */
.header{
  background:var(--header);
  padding:11px 14px;
  display:flex; align-items:center; gap:10px;
  border-bottom:1px solid rgba(0,201,141,.08);
  flex-shrink:0;
}
.back{color:var(--sub);font-size:22px;line-height:1;cursor:pointer;}
.avatar{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--green2),var(--green),#007a62);
  display:flex;align-items:center;justify-content:center;
  font-family:'Outfit',sans-serif;font-weight:800;font-size:13px;
  color:#fff;letter-spacing:-.5px;
  box-shadow:0 0 0 2px rgba(0,201,141,.3);
}
.hinfo{flex:1;min-width:0;}
.hname{
  font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;
  color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.hstatus{font-size:11.5px;color:var(--green);margin-top:1px;}
.hicons{display:flex;gap:18px;color:var(--sub);font-size:19px;cursor:pointer;}

/* ── CHAT ── */
.chat{
  flex:1;overflow-y:auto;padding:10px 10px 6px;
  display:flex;flex-direction:column;gap:3px;
  background-image:radial-gradient(circle at 20% 50%, rgba(0,201,141,.03) 0%, transparent 60%),
    radial-gradient(circle at 80% 20%, rgba(0,245,170,.02) 0%, transparent 50%);
}
.chat::-webkit-scrollbar{width:3px;}
.chat::-webkit-scrollbar-thumb{background:rgba(0,201,141,.15);border-radius:4px;}

.date-chip{text-align:center;margin:6px 0 10px;}
.date-chip span{
  background:rgba(14,26,21,.9);color:var(--sub);
  font-size:11px;padding:4px 12px;border-radius:7px;
}

/* ── BUBBLES ── */
.row{display:flex;align-items:flex-end;gap:5px;}
.row.out{flex-direction:row-reverse;}
.av{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--green2),var(--green));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;font-family:'Outfit',sans-serif;
}
.bubble{
  max-width:78%;padding:8px 12px 6px;
  border-radius:var(--radius);
  font-size:14px;line-height:1.48;color:var(--text);
  position:relative;word-break:break-word;
}
.row.in  .bubble{background:var(--in); border-top-left-radius:2px;}
.row.out .bubble{background:var(--out);border-top-right-radius:2px;}
.bubble b{font-weight:600;color:var(--green2);}
.meta{display:flex;align-items:center;justify-content:flex-end;gap:3px;margin-top:3px;}
.meta .t{font-size:10.5px;color:rgba(255,255,255,.3);}
.meta .tick{font-size:12px;color:var(--blue);}

/* ── TYPING ── */
.typing{
  display:none;align-items:center;gap:4px;
  background:var(--in);padding:10px 14px;
  border-radius:var(--radius);border-top-left-radius:2px;
  width:fit-content;margin-left:33px;
}
.typing.show{display:flex;}
.dot{width:7px;height:7px;background:var(--sub);border-radius:50%;animation:bop .9s infinite;}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.30s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── QUICK REPLIES ── */
.qr-wrap{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 4px 33px;}
.qr{
  border:1.5px solid var(--green);color:var(--green);
  background:transparent;padding:6px 14px;border-radius:20px;
  font-size:13px;font-family:'Outfit',sans-serif;
  cursor:pointer;transition:all .18s;font-weight:500;
  text-decoration:none; display:inline-block;
}
.qr:hover{background:var(--green);color:#fff;}
.qr:disabled{opacity:.35;cursor:default;pointer-events:none;}

/* ── COMBO CARDS ── */
.combos-wrap{
  display:flex;flex-direction:column;gap:8px;
  margin:6px 0 6px 33px;width:calc(100% - 41px);
}
.combo-card{
  background:linear-gradient(145deg,#0f2018,#091510);
  border:1px solid rgba(0,201,141,.18);
  border-radius:12px;padding:13px 14px;
  transition:border-color .2s, transform .15s;
  cursor:default;
}
.combo-card:hover{border-color:rgba(0,201,141,.4);transform:translateX(2px);}
.combo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.combo-name{font-size:14px;font-weight:700;color:var(--green2);}
.combo-rango{
  font-size:10px;font-weight:700;letter-spacing:.5px;
  background:rgba(0,201,141,.12);color:var(--green);
  border:1px solid rgba(0,201,141,.25);
  padding:2px 8px;border-radius:20px;
}
.combo-specs{display:flex;flex-direction:column;gap:3px;margin-bottom:10px;}
.combo-spec{font-size:12.5px;color:#9bbfac;display:flex;gap:6px;align-items:flex-start;}
.combo-spec .si{flex-shrink:0;width:16px;}
.combo-cta{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:#25d366;color:#fff;border:none;border-radius:9px;
  padding:10px 16px;font-size:13px;font-weight:700;
  font-family:'Outfit',sans-serif;cursor:pointer;
  text-decoration:none;transition:background .18s,transform .12s;
  width:100%;margin-top:2px;
}
.combo-cta:hover{background:#1ebe5c;transform:scale(1.01);}
.combo-cta svg{width:16px;height:16px;fill:#fff;flex-shrink:0;}

/* ── WA BUTTON standalone ── */
.wa-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:#25d366;color:#fff;border:none;border-radius:10px;
  padding:12px 18px;font-size:14px;font-weight:700;
  font-family:'Outfit',sans-serif;cursor:pointer;
  text-decoration:none;transition:background .18s,transform .12s;
  margin:6px 8px 4px 33px;
}
.wa-btn:hover{background:#1ebe5c;transform:scale(1.01);}
.wa-btn svg{width:20px;height:20px;fill:#fff;flex-shrink:0;}

/* ── INPUT BAR ── */
.bar{
  background:var(--header);padding:8px 10px;
  display:flex;align-items:center;gap:8px;
  border-top:1px solid rgba(0,201,141,.06);flex-shrink:0;
}
.bar input{
  flex:1;background:var(--input-bg);border:none;outline:none;
  color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;
  padding:9px 15px;border-radius:22px;
}
.bar input::placeholder{color:var(--sub);}
.send{
  width:42px;height:42px;border-radius:50%;
  background:var(--green);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:17px;flex-shrink:0;transition:background .18s;
}
.send:hover{background:var(--green2);}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#132018;border:1px solid rgba(0,201,141,.3);
  color:var(--green);font-size:13px;padding:9px 18px;
  border-radius:24px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
  z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:440px){
  html,body{padding:0;}
  .phone{border-radius:0;height:100vh;width:100%;}
}
</style>
</head>

<div class="phone">

<div class="toast" id="toast">✅ ¡Datos guardados — te contactamos pronto!</div>

<script>
// ══════════════════════════════════════════
// CONFIG — editá estos valores
// ══════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzFyCPN95NclQYFQoaPwmM2J8yncY8VuEUreY8soplJzJNFayNcQ9t3vCCC8tzoNDwf6g/exec';
const WA_NUMBER       = '593983358832';
const RECAPTCHA_KEY   = '6LdX4w4tAAAAAEYtFnDAG-D8FijKMffkTbahsIRv'; // ← reemplazá con tu site key de https://www.google.com/recaptcha

// ══════════════════════════════════════════
// SEGMENTOS
// ══════════════════════════════════════════
const SEGMENTOS = [
  { id:'F1', combo:'Sol Esencial',    rango:'$0 – $50',    kwp:5,    potencia:4.53,  m2:19,  desc:'Sistema de entrada ideal para hogares con consumo bajo. Cubre iluminación, electrodomésticos básicos y reduce tu factura desde el primer mes.' },
  { id:'F2', combo:'Sol Familiar',    rango:'$50 – $100',  kwp:8,    potencia:7.55,  m2:32,  desc:'El favorito de las familias. Cubre la mayoría de tu consumo diario: refrigerador, lavadora, aire acondicionado moderado y más.' },
  { id:'F3', combo:'Sol Confort',     rango:'$100 – $150', kwp:15,   potencia:14.09, m2:60,  desc:'Para hogares con mayor consumo o EVs. Alta generación que puede cubrir el 100% de tu factura y cargar tu vehículo eléctrico.' },
  { id:'N1', combo:'Sol Negocio',     rango:'$200 – $300', kwp:26,   potencia:25.16, m2:108, desc:'Ideal para locales comerciales y oficinas. Reduce costos operativos significativamente con retorno de inversión en menos de 4 años.' },
  { id:'N2', combo:'Sol Empresa',     rango:'$300 – $400', kwp:37,   potencia:36.23, m2:155, desc:'Para medianas empresas con consumo sostenido. Incluye monitoreo remoto en tiempo real y soporte técnico prioritario.' },
  { id:'N3', combo:'Sol Industrial',  rango:'$400 – $500', kwp:48,   potencia:47.30, m2:203, desc:'Solución de alto rendimiento para industrias y plantas. Diseño personalizado, instalación especializada y máxima eficiencia.' },
  { id:'N4', combo:'Sol Corporativo', rango:'Más de $500', kwp:null, potencia:null,  m2:null, desc:'Proyecto a medida para grandes corporaciones. Un asesor técnico diseñará la solución óptima según tu demanda energética específica.' },
];

const COMBOS_RESIDENCIAL = SEGMENTOS.filter(s => ['F1','F2','F3'].includes(s.id));
const COMBOS_EMPRESA     = SEGMENTOS.filter(s => ['N1','N2','N3','N4'].includes(s.id));

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const S = {
  flujo: '',
  nombre: '',
  telefono: '',
  email: '',
  consumo: '',
  origen: 'Web',
};

const now = () => {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
};

// Arma el mensaje precompletado de WhatsApp según el flujo
function buildWAMsg(combo) {
  const flujoLabel = {
    'ev_hogar':      'tengo / voy a tener un EV',
    'solar_puro':    'quiero reducir mi factura eléctrica',
    'empresa':       'soy empresa o tengo flota',
    'electrolinera': 'quiero información sobre electrolineras',
  }[S.flujo] || S.flujo;

  let msg = `Hola Nepos Energy! Soy *${S.nombre || 'un cliente'}* y ${flujoLabel}.`;
  if (S.consumo && S.consumo !== 'No sé / prefiero no decir') msg += ` Mi consumo eléctrico es aproximadamente *${S.consumo}*.`;
  if (combo) msg += ` Me interesó el combo *${combo}* y quiero más información.`;
  else msg += ` Quisiera hablar con un asesor.`;
  return encodeURIComponent(msg);
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
const chat     = document.getElementById('chat');
const typingEl = document.getElementById('typing');

function scrollDown(){ setTimeout(()=>{ chat.scrollTop = chat.scrollHeight; }, 60); }

function addBubble(text, dir='in'){
  const row = document.createElement('div');
  row.className = `row ${dir}`;
  if(dir==='in'){
    const av = document.createElement('div');
    av.className='av'; av.textContent='NE';
    row.appendChild(av);
  }
  const bub = document.createElement('div');
  bub.className='bubble';
  bub.innerHTML = text
    .replace(/\*(.*?)\*/g,'<b>$1</b>')
    .replace(/_(.*?)_/g,'<i style="color:var(--sub);font-size:13px">$1</i>')
    .replace(/\n/g,'<br>') +
    `<div class="meta"><span class="t">${now()}</span>${dir==='out'?'<span class="tick">✓✓</span>':''}</div>`;
  row.appendChild(bub);
  chat.appendChild(row);
  scrollDown();
}

function addOptions(opts, onPick){
  if(!opts || opts.length===0) return;
  const wrap = document.createElement('div');
  wrap.className='qr-wrap';
  opts.forEach(o=>{
    const label = typeof o==='string' ? o : o.label;
    const btn   = document.createElement('button');
    btn.className='qr'; btn.textContent=label;
    btn.onclick = ()=>{
      wrap.querySelectorAll('button').forEach(b=>{ b.disabled=true; b.style.opacity='.35'; });
      addBubble(label,'out');
      onPick(label);
    };
    wrap.appendChild(btn);
  });
  chat.appendChild(wrap);
  scrollDown();
}

function addWaBtn(comboNombre){
  const msg  = buildWAMsg(comboNombre);
  const link = document.createElement('a');
  link.className='wa-btn';
  link.href=`https://wa.me/${WA_NUMBER}?text=${msg}`;
  link.target='_blank';
  link.innerHTML=`${waSVG()}Continuar por WhatsApp`;
  chat.appendChild(link);
  scrollDown();
}

function addCombos(combos){
  const wrap = document.createElement('div');
  wrap.className='combos-wrap';
  combos.forEach(c=>{
    const card = document.createElement('div');
    card.className='combo-card';
    const kwpLine  = c.kwp      ? `<div class="combo-spec"><span class="si">⚡</span><span>${c.kwp} kWp · ${c.potencia} kW de potencia</span></div>` : '';
    const m2Line   = c.m2       ? `<div class="combo-spec"><span class="si">📐</span><span>Requiere ~${c.m2} m² de techo</span></div>` : '';
    const kwpBadge = c.kwp      ? `<span class="combo-rango">${c.rango} / mes</span>` : `<span class="combo-rango">>$500 / mes</span>`;
    const waMsg    = buildWAMsg(c.combo);
    card.innerHTML = `
      <div class="combo-header">
        <span class="combo-name">☀️ ${c.combo}</span>
        ${kwpBadge}
      </div>
      <div class="combo-specs">
        <div class="combo-spec"><span class="si">💬</span><span>${c.desc}</span></div>
        ${kwpLine}
        ${m2Line}
        <div class="combo-spec"><span class="si">🛡️</span><span>Garantía 25 años en paneles · 10 años en inversores</span></div>
      </div>
      <a class="combo-cta" href="https://wa.me/${WA_NUMBER}?text=${waMsg}" target="_blank">
        ${waSVG()}Me interesa saber más
      </a>`;
    wrap.appendChild(card);
  });
  chat.appendChild(wrap);
  scrollDown();
}

function waSVG(){
  return `<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;
}

function showTyping(cb, delay=1000){
  typingEl.classList.add('show'); scrollDown();
  setTimeout(()=>{ typingEl.classList.remove('show'); cb(); }, delay);
}

// ══════════════════════════════════════════
// reCAPTCHA v3
// ══════════════════════════════════════════
async function getRecaptchaToken(){
  return new Promise((resolve) => {
    if(typeof grecaptcha === 'undefined' || RECAPTCHA_KEY === 'TU_SITE_KEY'){
      // Si no está configurado, continúa sin bloquear
      resolve('no-recaptcha-configured');
      return;
    }
    grecaptcha.ready(() => {
      grecaptcha.execute(RECAPTCHA_KEY, { action: 'submit_lead' })
        .then(token => resolve(token))
        .catch(() => resolve('recaptcha-error'));
    });
  });
}

// ══════════════════════════════════════════
// GOOGLE SHEETS
// ══════════════════════════════════════════
async function saveToSheet(){
  const token = await getRecaptchaToken();
  const url = APPS_SCRIPT_URL
    + '?action=crearLeadExterno'
    + '&nombre='       + encodeURIComponent(S.nombre)
    + '&telefono='     + encodeURIComponent(S.telefono)
    + '&email='        + encodeURIComponent(S.email)
    + '&flujo='        + encodeURIComponent(S.flujo)
    + '&consumo='      + encodeURIComponent(S.consumo)
    + '&origen='       + encodeURIComponent(S.origen)
    + '&recaptcha='    + encodeURIComponent(token);
  try {
    await fetch(url, { method:'GET', mode:'no-cors' });
  } catch(e) {
    console.warn('saveToSheet error:', e);
  }
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
}

// ══════════════════════════════════════════
// FLOW ENGINE
// ══════════════════════════════════════════
let currentKey = 'inicio';
let waitingFree = false;

function runStep(key){
  currentKey = key;
  waitingFree = false;
  const step = STEPS[key];
  if(!step) return;
  if(step.onEnter) step.onEnter();

  const msgs = typeof step.msgs === 'function' ? step.msgs(S) : step.msgs;
  const opts = typeof step.opts === 'function' ? step.opts(S) : (step.opts || []);

  let i = 0;
  function next(){
    if(i >= msgs.length){
      if(step.free){ waitingFree = true; return; }
      if(step.render){ step.render(); return; }
      if(opts.length) addOptions(opts, ans => {
        const nk = step.next(ans);
        setTimeout(()=>runStep(nk), 380);
      });
      return;
    }
    const m = msgs[i++];
    showTyping(()=>{
      if(m && m.type==='combos')  addCombos(m.data);
      else if(m && m.type==='wa') addWaBtn(m.combo);
      else addBubble(m,'in');
      setTimeout(next, 280);
    }, i===1 ? 950 : 650);
  }
  next();
}

function handleFree(val){
  if(!waitingFree) return;
  waitingFree = false;
  addBubble(val,'out');
  const step = STEPS[currentKey];
  const nk = step.next(val);
  setTimeout(()=>runStep(nk), 380);
}

// STEPS

const STEPS = {

  inicio: {
    msgs: [`👋 ¡Hola! Soy el *agente de Nepos Energy*. Estoy aquí para ayudarte a encontrar la solución energética perfecta ☀️⚡\n\n¿Qué te trae por acá?`],
    opts: ['🚗 Tengo / voy a tener un EV','☀️ Quiero reducir mi factura','🏢 Soy empresa o tengo flota','🔌 Quiero saber sobre electrolineras'],
    next: a => {
      if(a.includes('EV'))            { S.flujo='ev_hogar';      return 'pedir_nombre'; }
      if(a.includes('factura'))       { S.flujo='solar_puro';    return 'pedir_nombre'; }
      if(a.includes('empresa'))       { S.flujo='empresa';       return 'pedir_nombre'; }
      S.flujo='electrolinera'; return 'pedir_nombre';
    },
  },

  pedir_nombre: {
    msgs: s => {
      const intro = {
        'ev_hogar':      '🚗 Genial, los EVs son el futuro.',
        'solar_puro':    '☀️ Excelente decisión.',
        'empresa':       '🏢 Perfecto, las empresas tienen mucho que ganar.',
        'electrolinera': '🔌 Con gusto te cuento sobre nuestras electrolineras.',
      }[s.flujo] || '';
      return [`${intro}\n\nAntes de continuar, ¿cuál es tu nombre?`];
    },
    free: true,
    next: a => {
      S.nombre = a.trim().split(' ')[0];
      return S.flujo === 'electrolinera' ? 'electrolinera_contacto' : 'pedir_consumo';
    },
  },

  // ── FLUJOS 1, 2, 3 ──────────────────────

  pedir_consumo: {
    msgs: s => [`¡Mucho gusto, *${s.nombre}*! 😊\n\n¿Sabés cuánto pagás aproximadamente en tu factura eléctrica mensual?\n\n_Si no sabés el dato exacto, no te preocupes, podés saltear esta pregunta._`],
    opts: s => {
      const base = s.flujo === 'empresa'
        ? ['Menos de $200','$200–$300','$300–$400','$400–$500','Más de $500']
        : ['Menos de $50','$50–$100','$100–$150','Más de $150'];
      return [...base, 'No sé / prefiero no decir'];
    },
    next: a => {
      S.consumo = a;
      return 'pedir_telefono';
    },
  },

  pedir_telefono: {
    msgs: s => [`Perfecto, *${s.nombre}* 👍\n\nAhora te vamos a preparar una propuesta. ¿Cuál es tu número de celular?`],
    free: true,
    next: a => { S.telefono = a.trim(); return 'pedir_email'; },
  },

  pedir_email: {
    msgs: [`📧 ¿Y tu correo electrónico?`],
    free: true,
    next: a => {
      S.email = a.trim();
      saveToSheet(); // ← guardamos ni bien tenemos los datos
      return S.flujo === 'empresa' ? 'oferta_empresa' : 'oferta_residencial';
    },
  },

  oferta_residencial: {
    msgs: s => [
      `✅ ¡Listo, *${s.nombre}*! Basándonos en tu perfil, estas son nuestras opciones para vos:\n\n_Hacé clic en "Me interesa saber más" en el combo que más te llame la atención para continuar la conversación con un asesor por WhatsApp._`,
      { type:'combos', data: COMBOS_RESIDENCIAL },
    ],
    opts: [],
    next: () => 'fin',
  },

  oferta_empresa: {
    msgs: s => [
      `✅ ¡Listo, *${s.nombre}*! Estas son nuestras soluciones para empresas y flotas:\n\n_Hacé clic en "Me interesa saber más" para que un asesor te contacte por WhatsApp._`,
      { type:'combos', data: COMBOS_EMPRESA },
    ],
    opts: [],
    next: () => 'fin',
  },

  // ── FLUJO 4 — ELECTROLINERAS ─────────────

  electrolinera_contacto: {
    msgs: s => [`¡Mucho gusto, *${s.nombre}*! 😊\n\nNuestro equipo de electro-movilidad puede ayudarte con toda la información sobre nuestras *electrolineras*.\n\nUn asesor estará encantado de contarte los detalles:`],
    render(){
      saveToSheet();
      setTimeout(()=>{
        const msg = buildWAMsg(null);
        const link = document.createElement('a');
        link.className='wa-btn';
        link.href=`https://wa.me/${WA_NUMBER}?text=${msg}`;
        link.target='_blank';
        link.innerHTML=`${waSVG()}Hablar con un asesor`;
        chat.appendChild(link);
        scrollDown();
      }, 300);
    },
    next: () => 'fin',
  },

  fin: {
    msgs: [`_Podés cerrar esta ventana o contactarnos directamente por WhatsApp cuando quieras. ¡Gracias por tu interés en Nepos Energy! ☀️_`],
    opts: [],
    next: () => 'fin',
  },
};
