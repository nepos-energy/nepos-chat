<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nepos Energy — Feria de Movilidad</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:       #080f0c;
  --panel:    #0e1a15;
  --header:   #132018;
  --in:       #172310;
  --out:      #003d2e;
  --input-bg: #1a2e22;
  --text:     #e8f0eb;
  --sub:      #6b8f78;
  --green:    #00c98d;
  --green2:   #00f5aa;
  --gold:     #f0c040;
  --orange:   #ff8c42;
  --blue:     #4eb5ff;
  --red:      #ff5f6d;
  --radius:   9px;
}

html,body{
  height:100%; background:var(--bg);
  font-family:'Outfit',sans-serif;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:16px;
}

/* ── PHONE ── */
.phone{
  width:400px; max-width:100%;
  height:min(840px,96vh);
  background:var(--panel);
  border-radius:28px; overflow:hidden;
  display:flex; flex-direction:column;
  box-shadow:
    0 0 0 1px rgba(0,201,141,.12),
    0 40px 100px rgba(0,0,0,.85),
    0 0 120px rgba(0,201,141,.04);
}

/* ── HEADER ── */
.header{
  background:var(--header);
  padding:11px 14px;
  display:flex; align-items:center; gap:10px;
  border-bottom:1px solid rgba(0,201,141,.08);
  flex-shrink:0;
}
.back{color:var(--sub);font-size:22px;line-height:1;cursor:pointer;}
.avatar{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--green2),var(--green),#007a62);
  display:flex;align-items:center;justify-content:center;
  font-family:'Outfit',sans-serif;font-weight:800;font-size:13px;
  color:#fff;letter-spacing:-.5px;
  box-shadow:0 0 0 2px rgba(0,201,141,.3);
}
.hinfo{flex:1;min-width:0;}
.hname{
  font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;
  color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.hstatus{font-size:11.5px;color:var(--green);margin-top:1px;}
.hicons{display:flex;gap:18px;color:var(--sub);font-size:19px;cursor:pointer;}

/* ── CHAT ── */
.chat{
  flex:1;overflow-y:auto;padding:10px 10px 6px;
  display:flex;flex-direction:column;gap:3px;
  background-image:radial-gradient(circle at 20% 50%, rgba(0,201,141,.03) 0%, transparent 60%),
    radial-gradient(circle at 80% 20%, rgba(0,245,170,.02) 0%, transparent 50%);
}
.chat::-webkit-scrollbar{width:3px;}
.chat::-webkit-scrollbar-thumb{background:rgba(0,201,141,.15);border-radius:4px;}

.date-chip{text-align:center;margin:6px 0 10px;}
.date-chip span{
  background:rgba(14,26,21,.9);color:var(--sub);
  font-size:11px;padding:4px 12px;border-radius:7px;
}

/* ── BUBBLES ── */
.row{display:flex;align-items:flex-end;gap:5px;}
.row.out{flex-direction:row-reverse;}
.av{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--green2),var(--green));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;font-family:'Outfit',sans-serif;
}
.bubble{
  max-width:78%;padding:8px 12px 6px;
  border-radius:var(--radius);
  font-size:14px;line-height:1.48;color:var(--text);
  position:relative;word-break:break-word;
}
.row.in  .bubble{background:var(--in); border-top-left-radius:2px;}
.row.out .bubble{background:var(--out);border-top-right-radius:2px;}
.bubble b{font-weight:600;color:var(--green2);}
.meta{display:flex;align-items:center;justify-content:flex-end;gap:3px;margin-top:3px;}
.meta .t{font-size:10.5px;color:rgba(255,255,255,.3);}
.meta .tick{font-size:12px;color:var(--blue);}

/* ── TYPING ── */
.typing{
  display:none;align-items:center;gap:4px;
  background:var(--in);padding:10px 14px;
  border-radius:var(--radius);border-top-left-radius:2px;
  width:fit-content;margin-left:33px;
}
.typing.show{display:flex;}
.dot{width:7px;height:7px;background:var(--sub);border-radius:50%;animation:bop .9s infinite;}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.30s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── QUICK REPLIES ── */
.qr-wrap{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 4px 33px;}
.qr{
  border:1.5px solid var(--green);color:var(--green);
  background:transparent;padding:6px 14px;border-radius:20px;
  font-size:13px;font-family:'Outfit',sans-serif;
  cursor:pointer;transition:all .18s;font-weight:500;
}
.qr:hover{background:var(--green);color:#fff;}
.qr:disabled{opacity:.35;cursor:default;pointer-events:none;}

/* ── SYSTEM CARD ── */
.card{
  background:linear-gradient(145deg,#0f2018,#091510);
  border:1px solid rgba(0,201,141,.2);
  border-radius:12px;padding:14px;
  width:100%;max-width:78%;margin-left:33px;
}
.card-badge{
  display:inline-block;padding:2px 9px;border-radius:20px;
  font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:8px;
  font-family:'Outfit',sans-serif;
}
.bg-green  {background:rgba(0,201,141,.15);color:var(--green);  border:1px solid rgba(0,201,141,.3);}
.bg-gold   {background:rgba(240,192,64,.12); color:var(--gold);   border:1px solid rgba(240,192,64,.28);}
.bg-orange {background:rgba(255,140,66,.12); color:var(--orange); border:1px solid rgba(255,140,66,.28);}
.bg-blue   {background:rgba(78,181,255,.12); color:var(--blue);   border:1px solid rgba(78,181,255,.28);}
.card h3{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px;color:var(--text);}
.card .csub{font-size:11.5px;color:var(--sub);margin-bottom:10px;}
.specs{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.spec{display:flex;gap:7px;font-size:12.5px;color:#9bbfac;align-items:flex-start;}
.spec .si{flex-shrink:0;width:18px;}
.divider{height:1px;background:rgba(255,255,255,.05);margin:10px 0;}
.price-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px;}
.price-label{color:var(--sub);}
.price-val{color:var(--text);font-weight:600;}
.price-val.hi{color:var(--green2);font-size:15px;}
.price-note{font-size:10.5px;color:var(--sub);font-style:italic;margin-top:8px;}
.card-meta{display:flex;justify-content:flex-end;margin-top:8px;}
.card-meta .t{font-size:10px;color:rgba(255,255,255,.25);}

/* ── CHARGER SECTION ── */
.charger-section{margin-top:10px;}
.charger-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--sub);margin-bottom:8px;}
.charger-row{
  background:rgba(0,0,0,.25);border-radius:8px;padding:8px 10px;
  margin-bottom:6px;border-left:3px solid var(--green);
}
.charger-row.semi{border-left-color:var(--gold);}
.charger-row.fast{border-left-color:var(--orange);}
.charger-name{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:2px;}
.charger-detail{font-size:11.5px;color:var(--sub);}

/* ── WA BUTTON ── */
.wa-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:#25d366;color:#fff;border:none;border-radius:10px;
  padding:11px 18px;font-size:14px;font-weight:600;
  font-family:'Outfit',sans-serif;cursor:pointer;
  text-decoration:none;transition:background .18s,transform .12s;
  margin-top:6px;width:100%;
}
.wa-btn:hover{background:#1ebe5c;transform:scale(1.01);}
.wa-btn svg{width:20px;height:20px;fill:#fff;flex-shrink:0;}

/* ── INPUT BAR ── */
.bar{
  background:var(--header);padding:8px 10px;
  display:flex;align-items:center;gap:8px;
  border-top:1px solid rgba(0,201,141,.06);flex-shrink:0;
}
.bar input{
  flex:1;background:var(--input-bg);border:none;outline:none;
  color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;
  padding:9px 15px;border-radius:22px;
}
.bar input::placeholder{color:var(--sub);}
.send{
  width:42px;height:42px;border-radius:50%;
  background:var(--green);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:17px;flex-shrink:0;transition:background .18s;
}
.send:hover{background:var(--green2);}

.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#132018;border:1px solid rgba(0,201,141,.3);
  color:var(--green);font-size:13px;padding:9px 18px;
  border-radius:24px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:440px){
  html,body{padding:0;}
  .phone{border-radius:0;height:100vh;width:100%;}
}
</style>
</head>
<body>

<div class="phone">
  <div class="header">
    <span class="back">‹</span>
    <div class="avatar">NE</div>
    <div class="hinfo">
      <div class="hname">Nepos Energy</div>
      <div class="hstatus">● en línea — Feria de Movilidad 2026</div>
    </div>
    <div class="hicons"><span>⬡</span><span>✆</span><span>⋮</span></div>
  </div>

  <div class="chat" id="chat">
    <div class="date-chip"><span>Hoy</span></div>
  </div>

  <div style="padding:0 10px 4px">
    <div class="typing" id="typing">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <div class="bar">
    <span style="font-size:22px;color:var(--sub);cursor:pointer">☺</span>
    <input id="inp" type="text" placeholder="Escribe un mensaje…" autocomplete="off"/>
    <button class="send" id="sendBtn">➤</button>
  </div>
</div>

<div class="toast" id="toast">✅ Datos guardados — ¡Nos contactamos pronto!</div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzFyCPN95NclQYFQoaPwmM2J8yncY8VuEUreY8soplJzJNFayNcQ9t3vCCC8tzoNDwf6g/exec';
const WA_NUMBER  = '593983358832';
const WA_MESSAGE = encodeURIComponent('Hola Nepos Energy, los conocí en la Feria de Movilidad y me interesa saber más sobre energía solar.');

let KWH_EV_VEHICULO = 400;
let KWH_PER_KWP_VAR = 120;

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const S = {
  flujo: '',
  nombre: '',
  email: '',
  telefono: '',
  consumo: 0,
  gasolina: 0,
  vivienda: '',
  n_vehiculos: 0,
  tipo_carga: '',
  combo: null,
  origen: 'Feria Movilidad 2026',
};

const now = () => {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
};

// ═══════════════════════════════════════════
// SISTEMAS SOLARES
// ═══════════════════════════════════════════
// Tabla de sistemas Nepos Energy (precios reales)
// TODO: mover a Config CRM cuando implementemos config dinámico
const SISTEMAS = [
  { key:'s7',  kwp:7,  contado:'$5.564',  ahorro:'~$63/mes'  },
  { key:'s10', kwp:10, contado:'$7.810',  ahorro:'~$90/mes'  },
  { key:'s20', kwp:20, contado:'$14.999', ahorro:'~$180/mes' },
  { key:'s30', kwp:30, contado:'$22.048', ahorro:'~$270/mes' },
  { key:'s50', kwp:50, contado:'$36.002', ahorro:'~$450/mes' },
  { key:'s75', kwp:75, contado:'$52.866', ahorro:'~$675/mes' },
];

const KWH_PER_KWP = 120;

// Factura $ ≈ consumo kWh en Ecuador residencial (tabla Nepos)
function recomendarSistema(kwh_total) {
  if(kwh_total <= 70)  return SISTEMAS[0]; // 7 kWp
  if(kwh_total <= 100) return SISTEMAS[1]; // 10 kWp
  if(kwh_total <= 200) return SISTEMAS[2]; // 20 kWp
  if(kwh_total <= 300) return SISTEMAS[3]; // 30 kWp
  if(kwh_total <= 500) return SISTEMAS[4]; // 50 kWp
  return SISTEMAS[5];                      // 75 kWp
}

// ═══════════════════════════════════════════
// CARGADORES
// ═══════════════════════════════════════════
const CARGADORES = {
  lento: {
    nombre: '🌙 Carga Lenta (AC Nivel 1)',
    potencia: '3.7 kW',
    tiempo: '8–12 horas',
    precio: '~$1.000',
    ideal: 'Carga nocturna en casa',
    cls: '',
  },
  semirrapido: {
    nombre: '⚡ Carga Semi-rápida (AC Nivel 2)',
    potencia: '7–22 kW',
    tiempo: '2–4 horas',
    precio: '~$2.500',
    ideal: 'Uso diario, hogar o empresa',
    cls: 'semi',
  },
  rapido: {
    nombre: '🚀 Carga Rápida (DC)',
    potencia: '50 kW+',
    tiempo: '20–45 minutos',
    precio: '~$25.000',
    ideal: 'Flotas, estaciones públicas',
    cls: 'fast',
  },
};

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
const chat = document.getElementById('chat');
const typing = document.getElementById('typing');

function scrollDown(){ setTimeout(()=>{ chat.scrollTop = chat.scrollHeight; }, 60); }

function addBubble(text, dir='in'){
  const row = document.createElement('div');
  row.className = `row ${dir}`;
  if(dir==='in'){
    const av = document.createElement('div');
    av.className='av'; av.textContent='NE';
    row.appendChild(av);
  }
  const bub = document.createElement('div');
  bub.className='bubble';
  bub.innerHTML = text
    .replace(/\*(.*?)\*/g,'<b>$1</b>')
    .replace(/_(.*?)_/g,'<i style="color:var(--sub);font-size:13px">$1</i>')
    .replace(/\n/g,'<br>') +
    `<div class="meta"><span class="t">${now()}</span>${dir==='out'?'<span class="tick">✓✓</span>':''}</div>`;
  row.appendChild(bub);
  chat.appendChild(row);
  scrollDown();
}

function addSistemaCard(sistema, kwh_total, flujo){
  const wrap = document.createElement('div');
  wrap.className='card';

  const badge = sistema.kwp <= 15 ? {cls:'bg-green', txt:'Residencial'}
              : sistema.kwp <= 50 ? {cls:'bg-gold',  txt:'Semi-industrial'}
              : {cls:'bg-blue', txt:'Industrial'};

  let specsHTML = `
    <div class="spec"><span class="si">⚡</span><span>${sistema.kwp} kWp instalados</span></div>
    <div class="spec"><span class="si">🔋</span><span>Genera ~${sistema.kwp * KWH_PER_KWP} kWh/mes</span></div>
    <div class="spec"><span class="si">📐</span><span>Requiere ~${Math.round(sistema.kwp * 6)} m² de techo</span></div>
    <div class="spec"><span class="si">🛡️</span><span>Garantía 25 años en paneles</span></div>`;

  let cargadoresHTML = '';
  if(flujo === 'ev_hogar' || flujo === 'empresa'){
    cargadoresHTML = `
      <div class="charger-section">
        <div class="charger-title">Opciones de carga EV</div>
        ${Object.values(CARGADORES).map(c=>`
          <div class="charger-row ${c.cls}">
            <div class="charger-name">${c.nombre}</div>
            <div class="charger-detail">${c.potencia} · ${c.tiempo} · <b style="color:var(--green)">${c.precio}*</b></div>
            <div class="charger-detail" style="margin-top:2px;font-size:11px">${c.ideal}</div>
          </div>`).join('')}
        <div class="price-note">* Precios de cargadores son referenciales. Un asesor confirmará el valor exacto según tu instalación.</div>
      </div>`;
  }

  wrap.innerHTML = `
    <span class="card-badge ${badge.cls}">${badge.txt}</span>
    <h3>☀️ SISTEMA SOLAR ${sistema.kwp} kWp</h3>
    <div class="csub">Consumo estimado cubierto: ~${kwh_total} kWh/mes</div>
    <div class="specs">${specsHTML}</div>
    <div class="divider"></div>
    <div class="price-row">
      <span class="price-label">💰 Precio contado</span>
      <span class="price-val hi">${sistema.contado}</span>
    </div>
    <div class="price-row">
      <span class="price-label">💚 Ahorro estimado</span>
      <span class="price-val">${sistema.ahorro}</span>
    </div>
    <div class="price-note">Financiamiento y contratos PPA disponibles — consultá con un asesor.</div>
    ${cargadoresHTML}
    <div class="card-meta"><span class="t">${now()}</span></div>`;

  chat.appendChild(wrap);
  scrollDown();
}

function addWaBtn(){
  const wrap = document.createElement('div');
  wrap.style.cssText = 'margin-left:33px;margin-right:8px;';
  const link = document.createElement('a');
  link.className='wa-btn';
  link.href=`https://wa.me/${WA_NUMBER}?text=${WA_MESSAGE}`;
  link.target='_blank';
  link.innerHTML=`<svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>Continuar por WhatsApp`;
  wrap.appendChild(link);
  chat.appendChild(wrap);
  scrollDown();
}

function addOptions(opts, onPick){
  if(!opts || opts.length===0) return;
  const wrap = document.createElement('div');
  wrap.className='qr-wrap';
  opts.forEach(o=>{
    const label = typeof o==='string' ? o : o.label;
    const isWA  = typeof o==='object' && o.isWA;
    const btn   = document.createElement(isWA ? 'a' : 'button');
    btn.className='qr'; btn.textContent=label;
    if(isWA){
      btn.href=`https://wa.me/${WA_NUMBER}?text=${WA_MESSAGE}`;
      btn.target='_blank'; btn.style.textDecoration='none';
    } else {
      btn.onclick = ()=>{
        wrap.querySelectorAll('button,a').forEach(b=>b.disabled=true);
        addBubble(label,'out');
        onPick(label);
      };
    }
    wrap.appendChild(btn);
  });
  chat.appendChild(wrap);
  scrollDown();
}

function showTyping(cb, delay=1000){
  typing.classList.add('show'); scrollDown();
  setTimeout(()=>{ typing.classList.remove('show'); cb(); }, delay);
}

// ═══════════════════════════════════════════
// FLOW ENGINE
// ═══════════════════════════════════════════
let currentKey = 0;

function runStep(key){
  currentKey = key;
  const step = typeof key==='number' ? STEPS[key] : EXTRA[key];
  if(!step) return;
  if(step.onEnter) step.onEnter();

  const rawMsgs = typeof step.msgs==='function' ? step.msgs(S) : step.msgs;
  const rawOpts = typeof step.opts==='function' ? step.opts(S) : step.opts;

  let i=0;
  function next(){
    if(i >= rawMsgs.length){
      addOptions(rawOpts, ans => {
        const nk = step.next(ans);
        setTimeout(()=>runStep(nk), 380);
      });
      return;
    }
    const m = rawMsgs[i++];
    showTyping(()=>{
      if(m && m.type==='sistema')  addSistemaCard(m.sistema, m.kwh, m.flujo);
      else if(m && m.type==='wa')  addWaBtn();
      else addBubble(m,'in');
      setTimeout(next, 280);
    }, i===1 ? 950 : 650);
  }
  next();
}

function handleFree(val){
  const step = typeof currentKey==='number' ? STEPS[currentKey] : EXTRA[currentKey];
  if(!step || !step.free) return;
  addBubble(val,'out');
  const nk = step.next(val);
  setTimeout(()=>runStep(nk), 380);
}

async function saveToSheet(){
  const url = APPS_SCRIPT_URL +
    '?action=crearLeadExterno' +
    '&nombre='       + encodeURIComponent(S.nombre) +
    '&telefono='     + encodeURIComponent(S.telefono) +
    '&email='        + encodeURIComponent(S.email) +
    '&flujo='        + encodeURIComponent(S.flujo) +
    '&consumo_kwh='  + encodeURIComponent(S.consumo) +
    '&n_vehiculos='  + encodeURIComponent(S.n_vehiculos) +
    '&tipo_carga='   + encodeURIComponent(S.tipo_carga) +
    '&combo='        + encodeURIComponent(S.combo||'') +
    '&origen='       + encodeURIComponent(S.origen) +
    '&vivienda='     + encodeURIComponent(S.vivienda);
   try {
    await fetch(url, { method: 'GET', mode: 'no-cors' });
  } catch(e) {
    console.warn('saveToSheet error:', e);
  }

  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
}
