<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepos Energy × BYD — Energía Solar</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #3E5A8B;
    --azul-dark: #2c4070;
    --azul-light: #5a7ab5;
    --amarillo: #FFD931;
    --amarillo-dark: #e6c000;
    --blanco: #ffffff;
    --gris-bg: #f4f6fa;
    --gris-card: #eef1f8;
    --texto: #1a2540;
    --texto-suave: #556080;
    --borde: #d0d8ec;
    --verde: #22c55e;
    --verde-bg: #dcfce7;
    --sombra: 0 4px 24px rgba(62,90,139,0.13);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    font-family: 'Outfit', sans-serif;
    background: var(--azul);
    overflow: hidden;
    touch-action: manipulation;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 800px 600px at 10% 20%, rgba(255,217,49,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 600px 800px at 90% 80%, rgba(255,255,255,0.05) 0%, transparent 60%),
      linear-gradient(160deg, #2c3e6e 0%, #3E5A8B 40%, #2a4878 100%);
    z-index: 0;
  }

  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    z-index: 1;
  }

  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px 12px;
    flex-shrink: 0;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--amarillo);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
    color: var(--azul);
    flex-shrink: 0;
  }

  .logo-text { line-height: 1.2; }
  .logo-text .brand { font-size: 15px; font-weight: 700; color: white; letter-spacing: -0.3px; }
  .logo-text .sub   { font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.6); letter-spacing: 0.5px; }

  .status-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 100px;
    padding: 5px 12px;
    color: rgba(255,255,255,0.9);
    font-size: 12px; font-weight: 500;
  }

  .status-dot {
    width: 6px; height: 6px;
    background: var(--verde);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.2); }
  }

  #chat-wrapper {
    flex: 1;
    margin: 0 24px;
    background: var(--blanco);
    border-radius: 20px 20px 0 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
    min-height: 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 32px;
    scroll-behavior: smooth;
    min-height: 0;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--borde); border-radius: 2px; }

  .msg {
    display: flex; gap: 10px;
    margin-bottom: 12px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.bot  { align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--amarillo);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    font-weight: 700; color: var(--azul);
  }

  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.5;
    font-weight: 400;
  }

  .msg.bot  .bubble { background: var(--gris-bg); color: var(--texto); border-bottom-left-radius: 4px; }
  .msg.user .bubble { background: var(--azul); color: white; border-bottom-right-radius: 4px; }
  .bubble strong    { font-weight: 600; color: inherit; }
  .bubble .highlight { color: var(--azul); font-weight: 600; }

  #options-area {
    padding: 8px 16px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    flex-shrink: 0;
  }

  #options-area.grid-2 .opt-btn { width: calc(50% - 3px); }
  #options-area.grid-1 .opt-btn { width: 100%; }

  .opt-btn {
    min-height: 40px;
    padding: 9px 14px;
    background: white;
    border: 1.5px solid var(--borde);
    border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 500;
    color: var(--texto);
    cursor: pointer; text-align: center;
    transition: all 0.18s ease;
    display: flex; align-items: center;
    justify-content: center;
    gap: 6px;
    line-height: 1.3;
    flex: 1 1 auto;
    min-width: 100px;
  }

  .opt-btn:hover, .opt-btn:active {
    background: var(--gris-card);
    border-color: var(--azul-light);
    color: var(--azul);
    transform: translateY(-2px);
  }

  .opt-btn .icon { font-size: 14px; flex-shrink: 0; }

  .opt-btn.primary {
    background: var(--azul); border-color: var(--azul); color: white;
  }
  .opt-btn.primary:hover {
    background: var(--azul-dark); border-color: var(--azul-dark);
    color: white; transform: translateY(-2px);
  }

  .opt-btn.amarillo {
    background: var(--amarillo); border-color: var(--amarillo-dark);
    color: var(--azul); font-weight: 600;
  }
  .opt-btn.amarillo:hover {
    background: var(--amarillo-dark); transform: translateY(-2px);
  }

  .input-area {
    padding: 10px 16px 14px;
    display: flex; gap: 8px; align-items: flex-end;
    flex-shrink: 0;
  }

  .input-wrap { flex: 1; position: relative; }

  .input-label {
    font-size: 11px; font-weight: 500;
    color: var(--texto-suave);
    margin-bottom: 4px; display: block;
  }

  .num-input {
    width: 100%; height: 46px;
    padding: 0 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px; font-weight: 600;
    color: var(--texto);
    background: var(--gris-bg);
    border: 1.5px solid var(--borde);
    border-radius: 12px;
    outline: none; transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  .num-input::-webkit-inner-spin-button,
  .num-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .num-input:focus { border-color: var(--azul); background: white; }

  .send-btn {
    height: 46px; padding: 0 18px;
    background: var(--azul); border: none;
    border-radius: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 600;
    color: white; cursor: pointer;
    transition: all 0.18s; white-space: nowrap; min-width: 80px;
  }
  .send-btn:hover  { background: var(--azul-dark); }
  .send-btn:active { transform: scale(0.97); }

  .typing-indicator {
    display: flex; gap: 4px; align-items: center;
    padding: 10px 14px;
    background: var(--gris-bg);
    border-radius: 14px; border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing-dot {
    width: 6px; height: 6px;
    background: var(--azul-light);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
    40%            { transform: translateY(-5px); opacity: 1; }
  }

  .result-card {
    background: linear-gradient(135deg, var(--azul) 0%, var(--azul-dark) 100%);
    border-radius: 14px; padding: 16px;
    color: white; margin: 2px 0 6px;
  }

  .result-title {
    font-size: 11px; font-weight: 500;
    opacity: 0.75; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 6px;
  }

  .result-ahorro {
    font-size: 26px; font-weight: 700;
    color: var(--amarillo); margin-bottom: 2px; line-height: 1;
  }

  .result-sub { font-size: 11px; opacity: 0.8; margin-bottom: 10px; }

  .result-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0;
    border-top: 1px solid rgba(255,255,255,0.12);
    font-size: 12px;
  }

  .result-row .label { opacity: 0.75; }
  .result-row .value { font-weight: 600; }
  .result-row .value.green { color: var(--amarillo); }

  /* ── QR CARD ── */
  .qr-card {
    background: var(--gris-bg);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }

  .qr-title { font-size: 14px; font-weight: 600; color: var(--texto); margin-bottom: 4px; }

  .qr-sub {
    font-size: 11px; color: var(--texto-suave);
    margin-bottom: 14px; line-height: 1.4;
  }

  .qr-img-wrap { display: flex; justify-content: center; margin-bottom: 10px; }

  .qr-img-wrap img {
    width: 150px; height: 150px;
    border-radius: 12px;
    border: 3px solid white;
    box-shadow: var(--sombra);
  }

  .codigo-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--azul); color: white;
    border-radius: 8px; padding: 7px 12px;
    font-size: 14px; font-weight: 700;
    letter-spacing: 1.5px; margin-bottom: 10px;
    font-family: 'Space Grotesk', monospace;
  }

  .codigo-badge .codigo-label {
    font-size: 10px; font-weight: 500;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase; letter-spacing: 1px;
    margin-right: 2px;
  }

  .qr-msg {
    font-size: 11px; color: var(--texto-suave);
    background: white; border-radius: 8px;
    padding: 8px 12px; text-align: left;
    border-left: 3px solid var(--amarillo);
    font-style: italic;
  }

  /* ── INACTIVIDAD ── */
  #inactivity-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(20,30,60,0.85);
    z-index: 100; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }

  #inactivity-overlay.show { display: flex; }

  .inactivity-box {
    background: white; border-radius: 20px;
    padding: 32px 28px; text-align: center;
    max-width: 360px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .inactivity-emoji { font-size: 40px; margin-bottom: 12px; display: block; }
  .inactivity-title { font-size: 18px; font-weight: 700; color: var(--texto); margin-bottom: 8px; }
  .inactivity-sub   { font-size: 13px; color: var(--texto-suave); margin-bottom: 6px; line-height: 1.5; }

  #countdown-num {
    font-size: 40px; font-weight: 700;
    color: var(--azul); margin: 12px 0; line-height: 1;
  }

  .inactivity-btn-wrap { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }

  .inact-btn {
    width: 100%; height: 46px; border-radius: 12px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.18s;
  }

  .inact-btn.seguir    { background: var(--azul); color: white; }
  .inact-btn.seguir:hover { background: var(--azul-dark); }
  .inact-btn.reiniciar { background: var(--gris-bg); color: var(--texto-suave); border: 1.5px solid var(--borde); }
  .inact-btn.reiniciar:hover { background: var(--borde); }

  .date-sep {
    text-align: center; font-size: 10px; color: var(--texto-suave);
    margin: 6px 0 14px;
    display: flex; align-items: center; gap: 8px;
  }

  .date-sep::before, .date-sep::after {
    content: ''; flex: 1; height: 1px; background: var(--borde);
  }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="logo-area">
      <div class="logo-icon">N</div>
      <div class="logo-text">
        <div class="brand">Nepos Energy × BYD</div>
        <div class="sub">Consultor Solar Inteligente</div>
      </div>
    </div>
    <div class="status-badge">
      <div class="status-dot"></div>
      En línea
    </div>
  </div>

  <div id="chat-wrapper">
    <div id="messages">
      <div class="date-sep">Hoy</div>
    </div>
    <div id="options-area"></div>
    <div id="input-area-container"></div>
  </div>
</div>

<!-- OVERLAY INACTIVIDAD -->
<div id="inactivity-overlay">
  <div class="inactivity-box">
    <span class="inactivity-emoji">💤</span>
    <div class="inactivity-title">¿Sigues ahí?</div>
    <div class="inactivity-sub">La pantalla se reiniciará en</div>
    <div id="countdown-num">30</div>
    <div class="inactivity-sub">segundos</div>
    <div class="inactivity-btn-wrap">
      <button class="inact-btn seguir"   onclick="dismissInactivity()">Seguir con mi consulta</button>
      <button class="inact-btn reiniciar" onclick="resetApp()">Reiniciar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIGURACIÓN
// ═══════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzFyCPN95NclQYFQoaPwmM2J8yncY8VuEUreY8soplJzJNFayNcQ9t3vCCC8tzoNDwf6g/exec';

// Defaults — se sobreescriben con lo que viene del Sheet
let CONFIG = {
  byd_wa_number:     '593983358832',
  byd_wa_msg_base:   'Hola! Los conocí en la concesionaria BYD y quiero más información sobre paneles solares',
  byd_bienvenida:    '¡Bienvenido! 👋',
  byd_costo_kwh:     0.0989,
  byd_produccion:    108,
  byd_precio_wp:     0.79,
  byd_margen:        0,
  byd_ahorro_ev:     20
};

// ── Cargar config desde Sheet al iniciar ──────────────────
async function cargarConfig() {
  try {
    const res  = await fetch(APPS_SCRIPT_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ action: 'getConfig' })
    });
    const data = await res.json();
    if (data.ok && data.config) {
      Object.keys(data.config).forEach(k => {
        if (data.config[k] !== '' && data.config[k] !== null) {
          CONFIG[k] = data.config[k];
        }
      });
      // Reconstruir segmentos si el Sheet tiene claves byd_seg_*
      reconstruirSegmentosDesdeConfig(data.config);
    }
  } catch (e) {
    // Sin conexión — usa defaults, el flujo sigue igual
  }
}

// ═══════════════════════════════════════════════════════════
//  ESTADO
// ═══════════════════════════════════════════════════════════
let state = {};
let inactivityTimer = null;
let countdownTimer  = null;
let countdownVal    = 30;

function initState() {
  state = {
    step:          'bienvenida',
    nombre:        '',
    telefono:      '',
    correo:        '',
    segId:         '',
    factura:       0,
    gasolina:      0,
    modeloBYD:     '',
    consumoEV:     0,
    m2:            null,
    tieneEspacio:  null,
    banco:         '',    // banco elegido para financiamiento
    codigoBYD:     ''
  };
}

// ═══════════════════════════════════════════════════════════
//  INACTIVIDAD
// ═══════════════════════════════════════════════════════════
const INACTIVITY_MS = 2 * 60 * 1000;

function resetInactivityTimer() {
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(showInactivityWarning, INACTIVITY_MS);
}

function showInactivityWarning() {
  countdownVal = 30;
  document.getElementById('countdown-num').textContent = countdownVal;
  document.getElementById('inactivity-overlay').classList.add('show');
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownVal--;
    document.getElementById('countdown-num').textContent = countdownVal;
    if (countdownVal <= 0) { clearInterval(countdownTimer); resetApp(); }
  }, 1000);
}

function dismissInactivity() {
  document.getElementById('inactivity-overlay').classList.remove('show');
  clearInterval(countdownTimer);
  resetInactivityTimer();
}

function resetApp() {
  document.getElementById('inactivity-overlay').classList.remove('show');
  clearInterval(countdownTimer);
  clearTimeout(inactivityTimer);
  document.getElementById('messages').innerHTML = '<div class="date-sep">Hoy</div>';
  document.getElementById('options-area').innerHTML = '';
  document.getElementById('input-area-container').innerHTML = '';
  initState();
  setTimeout(() => startFlow(), 400);
}

['click','touchstart','keydown'].forEach(e => {
  document.addEventListener(e, resetInactivityTimer, { passive: true });
});

// ═══════════════════════════════════════════════════════════
//  HELPERS DOM
// ═══════════════════════════════════════════════════════════
function addMsg(html, type = 'bot', delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const msgs = document.getElementById('messages');
      const div  = document.createElement('div');
      div.className = `msg ${type}`;
      if (type === 'bot') {
        div.innerHTML = `<div class="avatar">☀️</div><div class="bubble">${html}</div>`;
      } else {
        div.innerHTML = `<div class="bubble">${html}</div>`;
      }
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      resolve();
    }, delay);
  });
}

function showTyping(ms = 900) {
  return new Promise(resolve => {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing-bubble';
    div.innerHTML = `<div class="avatar">☀️</div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    setTimeout(() => {
      const el = document.getElementById('typing-bubble');
      if (el) el.remove();
      resolve();
    }, ms);
  });
}

function clearOptions() {
  document.getElementById('options-area').innerHTML = '';
  document.getElementById('input-area-container').innerHTML = '';
}

function showOptions(opts) {
  const area = document.getElementById('options-area');
  area.innerHTML = '';

  // Grilla automática según cantidad
  area.classList.remove('grid-1', 'grid-2');
  if (opts.length === 4 || opts.length >= 5) {
    area.classList.add('grid-2');
  } else {
    area.classList.add('grid-1');
  }

  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = `opt-btn${opt.primary ? ' primary' : ''}${opt.amarillo ? ' amarillo' : ''}`;
    btn.innerHTML = `${opt.icon ? `<span class="icon">${opt.icon}</span>` : ''}${opt.label}`;
    btn.addEventListener('click', () => {
      resetInactivityTimer();
      clearOptions();
      if (opt.value !== undefined) addMsg(opt.label, 'user');
      if (opt.action) opt.action(opt.value !== undefined ? opt.value : opt.label);
    });
    area.appendChild(btn);
  });

  // Scroll al fondo para que los mensajes queden visibles encima de los botones
  setTimeout(() => {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }, 50);
}

function showNumericInput(label, placeholder, unit, onSubmit, min = 0) {
  const container = document.getElementById('input-area-container');
  container.innerHTML = `
    <div class="input-area">
      <div class="input-wrap">
        <span class="input-label">${label}</span>
        <input type="number" class="num-input" id="num-field" placeholder="${placeholder}" min="${min}" inputmode="numeric">
      </div>
      <button class="send-btn" id="send-num">Continuar →</button>
    </div>`;
  const input = document.getElementById('num-field');
  const btn   = document.getElementById('send-num');
  function submit() {
    const val = parseFloat(input.value);
    if (isNaN(val) || val < min) { input.style.borderColor = '#ef4444'; setTimeout(() => input.style.borderColor = '', 1000); return; }
    resetInactivityTimer();
    clearOptions();
    addMsg(`${val} ${unit}`, 'user');
    onSubmit(val);
  }
  btn.addEventListener('click', submit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

  setTimeout(() => {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
    input.focus();
  }, 100);
}

function showTextInput(label, placeholder, onSubmit, type = 'text') {
  const container = document.getElementById('input-area-container');
  container.innerHTML = `
    <div class="input-area">
      <div class="input-wrap">
        <span class="input-label">${label}</span>
        <input type="${type}" class="num-input" id="text-field" placeholder="${placeholder}" style="font-size:18px;font-weight:400;" autocomplete="off">
      </div>
      <button class="send-btn" id="send-txt">Continuar →</button>
    </div>`;
  const input = document.getElementById('text-field');
  const btn   = document.getElementById('send-txt');
  function submit() {
    const val = input.value.trim();
    if (!val) return;
    resetInactivityTimer();
    clearOptions();
    addMsg(val, 'user');
    onSubmit(val);
  }
  btn.addEventListener('click', submit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

  // Scroll para que los mensajes anteriores queden visibles
  setTimeout(() => {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
    input.focus();
  }, 100);
}

// ═══════════════════════════════════════════════════════════
//  SEGMENTOS Y CÁLCULO

// Se puebla en cargarConfig() si el Sheet tiene claves byd_seg_*
// Si no, se usa SEGMENTOS_DEFAULT tal cual
let SEGMENTOS = [...SEGMENTOS_DEFAULT];

// Reconstruir SEGMENTOS desde config del Sheet
// Prioridad de precio: SISTEMAS_byd_XX > byd_seg_XX_costo > default hardcodeado
function reconstruirSegmentosDesdeConfig(cfg) {
  const ids = ['F1','F2','F3','F4','N1','N2','N3','N4'];

  // ¿Hay alguna clave relevante en el config?
  const hayConfig = ids.some(id =>
    cfg['SISTEMAS_byd_' + id] || cfg['byd_seg_' + id + '_costo']
  );
  if (!hayConfig) return; // sin claves → usar defaults hardcodeados

  const nuevos = ids.map(id => {
    const def = SEGMENTOS_DEFAULT.find(s => s.id === id);

    // Precio: primero SISTEMAS_byd_XX, luego byd_seg_XX_costo, luego default
    const costoRaw = cfg['SISTEMAS_byd_' + id] || cfg['byd_seg_' + id + '_costo'];
    const costo = costoRaw ? parseFloat(costoRaw) : def.costo;

    return {
      id,
      combo:    cfg['byd_seg_' + id + '_combo']   || def.combo,
      label:    cfg['byd_seg_' + id + '_label']   || def.label,
      rango:    cfg['byd_seg_' + id + '_rango']   || def.rango,
      min:      parseFloat(cfg['byd_seg_' + id + '_min'])     || def.min,
      max:      parseFloat(cfg['byd_seg_' + id + '_max'])     || def.max,
      consumo:  parseFloat(cfg['byd_seg_' + id + '_consumo']) || def.consumo,
      kwp:      cfg['byd_seg_' + id + '_kwp']  ? parseFloat(cfg['byd_seg_' + id + '_kwp'])  : def.kwp,
      potencia: cfg['byd_seg_' + id + '_pot']  ? parseFloat(cfg['byd_seg_' + id + '_pot'])  : def.potencia,
      costo:    id === 'N4' ? null : costo,
      m2:       cfg['SISTEMAS_byd_' + id + '_m2'] ? parseFloat(cfg['SISTEMAS_byd_' + id + '_m2']) :
                cfg['byd_seg_' + id + '_m2'] ? parseFloat(cfg['byd_seg_' + id + '_m2']) : def.m2,  // N4 siempre requiere estudio
    };
  });
  SEGMENTOS = nuevos;
}

// ═══════════════════════════════════════════════════════════
//  LÓGICA DE RECOMENDACIÓN
//  1. m² disponibles → sistema máximo que entra físicamente
//  2. factura → segmento ideal por consumo
//  3. Se recomienda el MENOR de los dos
//  4. Si el espacio limita: mostrar % de cobertura de factura
// ═══════════════════════════════════════════════════════════

function getSegmento(id) { return SEGMENTOS.find(s => s.id === id); }

// Segmento máximo que entra en los m² disponibles
// Devuelve null si no alcanza ni para F1 (menos de 20m²)
function segmentoPorM2(m2) {
  const desc = ['N4','N3','N2','N1','F6','F5','F4','F3','F2','F1'];
  for (const id of desc) {
    const seg = SEGMENTOS.find(s => s.id === id);
    if (seg && seg.m2 && m2 >= seg.m2) return seg;
  }
  // Menos de 19m² — no entra ningún sistema estándar
  return null;
}

// Segmento ideal por consumo eléctrico (factura)
function segmentoPorFactura(segId) {
  return SEGMENTOS.find(s => s.id === segId);
}

function calcAhorro(segId, gasolina, m2Disponibles) {
  const segConsumo = segmentoPorFactura(segId);
  const segEspacio = m2Disponibles ? segmentoPorM2(m2Disponibles) : segConsumo;

  // Sin espacio suficiente para ningún sistema estándar
  if (m2Disponibles && segEspacio === null) {
    return {
      seg: segConsumo,
      sinEspacio: true,
      m2Disponibles,
      m2Minimo: SEGMENTOS.find(s => s.id === 'F1').m2,
      requiereEstudio: true,
      limitadoPorEspacio: false,
      coberturaPct: 0,
      ahorroElec: 0, ahorroGaso: 0, ahorroEV: 0,
      ahorroTotal: 0, ahorroAnual: 0,
      kwp: null, potencia: null, costoSistema: null, paybackAnios: null,
      modeloBYD: state.modeloBYD
    };
  }

  const orden = ['F1','F2','F3','F4','F5','F6','N1','N2','N3','N4'];
  const idxConsumo = orden.indexOf(segConsumo.id);
  const idxEspacio = orden.indexOf(segEspacio.id);

  const limitadoPorEspacio = idxEspacio < idxConsumo;
  const seg = limitadoPorEspacio ? segEspacio : segConsumo;

  // Consumo EV mensual en $ (kWh × tarifa)
  const TARIFA = parseFloat(CONFIG.byd_costo_kwh) || 0.0989;
  const consumoEV    = state.consumoEV || 0;
  const costoEVmes   = Math.round(consumoEV * TARIFA);  // $ que cuesta cargar el BYD

  // N4 requiere estudio
  if (seg.costo === null) {
    return {
      seg, limitadoPorEspacio: false, coberturaPct: 100,
      ahorroElec:  Math.round(seg.consumo * 0.70),
      ahorroGaso:  Math.round(gasolina * 0.60),
      ahorroEV:    costoEVmes,
      ahorroTotal: Math.round(seg.consumo * 0.70) + Math.round(gasolina * 0.60) + costoEVmes,
      ahorroAnual: (Math.round(seg.consumo * 0.70) + Math.round(gasolina * 0.60) + costoEVmes) * 12,
      kwp: null, potencia: null, costoSistema: null, paybackAnios: null,
      requiereEstudio: true, modeloBYD: state.modeloBYD
    };
  }

  let coberturaPct = 100;
  if (limitadoPorEspacio && segConsumo.kwp && seg.kwp) {
    coberturaPct = Math.round((seg.kwp / segConsumo.kwp) * 100);
    if (coberturaPct > 100) coberturaPct = 100;
  }

  const ahorroElec  = Math.round(seg.consumo * 0.70 * (coberturaPct / 100));
  const ahorroGaso  = Math.round(gasolina * 0.60);
  const ahorroEV    = costoEVmes;
  const ahorroTotal = ahorroElec + ahorroGaso + ahorroEV;
  const ahorroAnual = ahorroTotal * 12;
  const paybackAnios = (seg.costo / ahorroAnual).toFixed(1);

  return {
    seg, limitadoPorEspacio, coberturaPct,
    segConsumoId: segConsumo.id,
    ahorroElec, ahorroGaso, ahorroEV, ahorroTotal, ahorroAnual,
    kwp: seg.kwp, potencia: seg.potencia,
    costoSistema: seg.costo, paybackAnios,
    requiereEstudio: false, modeloBYD: state.modeloBYD
  };
}

// ═══════════════════════════════════════════════════════════
//  QR — construye la URL con el código BYD embebido
// ═══════════════════════════════════════════════════════════
function buildWAUrl(codigoBYD) {
  const msgBase = CONFIG.byd_wa_msg_base || 'Hola! Los conocí en la concesionaria BYD y quiero más información sobre paneles solares';
  const numero  = CONFIG.byd_wa_number  || '593983358832';
  const msgFull = codigoBYD
    ? `${msgBase} — Ref: ${codigoBYD}`
    : msgBase;
  return `https://wa.me/${numero}?text=${encodeURIComponent(msgFull)}`;
}

function getQRUrl(waUrl) {
  return `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(waUrl)}&color=3E5A8B&bgcolor=f4f6fa&margin=10`;
}

        </div>
        <div style="background:rgba(255,255,255,0.1);border-radius:8px;padding:8px;grid-column:1/-1">
          <div style="font-size:10px;opacity:0.65;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px">Payback estimado</div>
          <div style="font-size:13px;font-weight:600;color:var(--amarillo)">${c.paybackAnios} años</div>
        </div>
      </div>
      <div style="background:rgba(255,255,255,0.07);border-radius:8px;padding:8px;margin-top:6px;font-size:11px;opacity:0.75;font-style:italic">
        El asesor calculará el ahorro real según su consumo y perfil
      </div>
    </div>
  </div>`;

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;

  await new Promise(r => setTimeout(r, 600));
  await showTyping(700);

  // Mensaje contextual según si el espacio limitó o no
  let msgExtra;
  if (c.limitadoPorEspacio) {
    const segIdeal = SEGMENTOS.find(s => s.id === c.segConsumoId);
    msgExtra = `En base al espacio disponible le recomendamos el <strong>${c.seg.combo}</strong>, que cubre el <strong>${c.coberturaPct}% de su planilla eléctrica</strong>. Si en el futuro amplía el espacio, puede escalar al <strong>${segIdeal ? segIdeal.combo : 'siguiente sistema'}</strong> para cobertura total.`;
  } else {
    msgExtra = `Con este sistema cubrirá una parte importante de su consumo eléctrico. El ahorro real dependerá de su perfil de consumo — un asesor le detallará los números exactos.`;
  }

  await addMsg(msgExtra);

  // Disclaimer — pausa antes para que el usuario pueda leer
  await new Promise(r => setTimeout(r, 1500));
  await addMsg(`<span style="font-size:11px;color:#778aa8;line-height:1.5">
    <em>📋 Esta estimación se calculó en base a los datos que nos compartió y los parámetros vigentes de Nepos Energy. Los valores finales pueden variar según las condiciones reales de su instalación. Un asesor le enviará una propuesta formal con todos los detalles.</em>
  </span>`);

  // Pausa antes de mostrar las opciones — da tiempo para leer todo
  await new Promise(r => setTimeout(r, 2500));
  await step_contacto();
}

async function guardarLeadFinanciamiento() {
  const c = calcAhorro(state.segId, state.gasolina, state.m2);

  const payload = {
    action:    'crearLeadExterno',
    nombre:    state.nombre,
    telefono:  state.telefono,
    email:     state.correo,
    origen:    'Tótem BYD — Financiamiento',
    flujo:     'financiamiento',
    banco:     state.banco,
    combo:     c.kwp + 'kWp',
    consumo_kwh: Math.round((c.kwp || 0) * 108),
    notas:     'FINANCIAMIENTO · Banco: ' + state.banco +
               ' | Segmento: ' + (c.seg ? c.seg.id : '') +
               ' | Planilla: ' + (c.seg ? c.seg.rango : '') +
               ' | Modelo BYD: ' + (state.modeloBYD || 'No definido') +
               ' | Sistema: ' + c.kwp + ' kWp ($' + (c.costoSistema || '').toLocaleString() + ')' +
               ' | Ahorro: $' + c.ahorroTotal + '/mes'
  };

  try {
    const res  = await fetch(APPS_SCRIPT_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.lead_id) state.codigoBYD = data.lead_id;
  } catch (e) {
    state.codigoBYD = '';
  }

  await showTyping(1000);

  const codigoLinea = state.codigoBYD
    ? `<br><br>Número de referencia: <strong style="letter-spacing:1px;font-family:monospace">${state.codigoBYD}</strong>`
    : '';

  await addMsg(`✅ <strong>¡Listo, ${state.nombre}!</strong><br><br>
    Sus datos fueron registrados. Un asesor financiero de <strong>${state.banco}</strong> se pondrá en contacto a la brevedad para ofrecerle la mejor alternativa de financiamiento.${codigoLinea}<br><br>
    🌟 <em>¡Gracias por su interés. Juntos hacia una movilidad solar!</em>`);

  await new Promise(r => setTimeout(r, 1000));
  await step_qr_final();
}

function guardarLeadParcial(c) {
  const payload = {
    action:  'crearLeadExterno',
    nombre:  'Anónimo (tótem)',
    origen:  'BYD Tótem — Sin contacto',
    flujo:   state.gasolina > 0 ? 'ev_hogar' : 'residencial',
    combo:   c.seg ? c.seg.combo : '',
    notas:   'Lead parcial · Segmento: ' + (c.seg ? c.seg.id : '') +
             ' | Planilla: ' + (c.seg ? c.seg.rango : '') +
             ' | Gasolina/mes: $' + state.gasolina +
             ' | Modelo BYD: ' + (state.modeloBYD || 'No definido') +
             (c.requiereEstudio ? ' | Requiere estudio técnico' :
               ' | Sistema: ' + c.kwp + ' kWp ($' + (c.costoSistema||'').toLocaleString() + ')' +
               ' | Ahorro: $' + c.ahorroTotal + '/mes')
  };
  // Fire & forget — no bloqueamos el flujo
  fetch(APPS_SCRIPT_URL, {
    method:  'POST',
    mode:    'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(payload)
  }).catch(() => {});
}

async function guardarLead() {
  const c = calcAhorro(state.segId, state.gasolina, state.m2);

  const payload = {
    action:    'crearLeadExterno',
    nombre:    state.nombre,
    telefono:  state.telefono,
    email:     state.correo,
    origen:    'Tótem BYD',
    flujo:     state.gasolina > 0 ? 'ev_hogar' : 'residencial',
    banco:     '',
    combo:     c.kwp + 'kWp',
    consumo_kwh: Math.round(c.kwp * 108),   // kwp × producción mensual referencial
    notas:     'Segmento: ' + c.seg.id +
               ' | Planilla: ' + c.seg.rango +
               ' | Modelo BYD: ' + (state.modeloBYD || 'No definido') +
               ' | Gasolina/mes: $' + state.gasolina +
               ' | Modalidad: Compra directa' +
               ' | M2: ' + (state.m2 || 'N/D') +
               ' | Espacio: ' + (state.tieneEspacio === true ? 'Sí' : state.tieneEspacio === false ? 'No' : 'Arrendatario') +
               ' | Sistema: ' + c.kwp + ' kWp ($' + c.costoSistema.toLocaleString() + ')' +
               ' | Ahorro: $' + c.ahorroTotal + '/mes' +
               ' | Payback: ' + c.paybackAnios + ' años'
  };

  // Fetch normal (necesitamos leer el código que devuelve el servidor)
  try {
    const res  = await fetch(APPS_SCRIPT_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.lead_id) {
      state.codigoBYD = data.lead_id;   // ej: "L-1749234567890"
    }
  } catch (e) {
    // Si falla la red, seguimos sin código — el flujo no se interrumpe
    state.codigoBYD = '';
  }

  await showTyping(1000);

  const codigoLinea = state.codigoBYD
    ? `<br><br>Su número de referencia: <strong style="letter-spacing:1px;font-family:monospace">${state.codigoBYD}</strong>`
    : '';

  await addMsg(`✅ <strong>¡Listo, ${state.nombre}!</strong><br><br>
    Su información fue registrada. Un asesor de Nepos Energy le contactará dentro de las próximas <strong>24 horas</strong> para enviarle su cotización por email.${codigoLinea}<br><br>
    🌟 <em>¡Gracias por su interés. Juntos hacia una movilidad solar!</em>`);

  await new Promise(r => setTimeout(r, 1000));
  await step_qr_final();
}

async function step_qr_final() {
  state.step = 'fin';
  await showTyping(600);

  const msgs   = document.getElementById('messages');
  const div    = document.createElement('div');
  div.className = 'msg bot';

  const waUrl  = buildWAUrl(state.codigoBYD);
  const qrSrc  = getQRUrl(waUrl);

  const codigoBadge = state.codigoBYD
    ? `<div style="text-align:center;margin-bottom:14px">
         <div class="codigo-badge">
           <span class="codigo-label">Ref.</span>${state.codigoBYD}
         </div>
       </div>`
    : '';

  const msgPreview = state.codigoBYD
    ? `Hola! Los conocí en la concesionaria BYD — Ref: ${state.codigoBYD}`
    : `Hola! Los conocí en la concesionaria BYD y quiero más información sobre paneles solares`;

  // Link WA solo en móvil
  const esMobil = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
  const waLinkHtml = esMobil
    ? `<a href="${waUrl}" style="display:block;margin-top:10px;background:#25d366;color:#fff;padding:10px 16px;border-radius:10px;text-decoration:none;font-size:13px;font-weight:600;text-align:center">💬 Abrir WhatsApp</a>`
    : '';

  div.innerHTML = `<div class="avatar">☀️</div><div class="bubble" style="max-width:90%">
    <div class="qr-card">
      <div class="qr-title">📱 ¡Escríbanos por WhatsApp!</div>
      <div class="qr-sub">Escanee el código con la cámara de su celular para contactarnos directamente</div>
      ${codigoBadge}
      <div class="qr-img-wrap">
        <img src="${qrSrc}" alt="QR WhatsApp Nepos Energy">
      </div>
      <div class="qr-msg">"${msgPreview}"</div>
      ${waLinkHtml}
    </div>
  </div>`;

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;

  await new Promise(r => setTimeout(r, 800));
  await showTyping(500);
  await addMsg('¿Desea hacer otra consulta o empezar de nuevo?');

  showOptions([
    { icon: '🔄', label: 'Nueva consulta', action: () => resetApp() },
  ]);
}
